server {
    listen 80;
    server_name _;
    root /var/www/levelup;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Fingerprinted assets — cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Search index — short cache, refreshes between deploys.
    location /pagefind/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Service worker + manifest must always revalidate.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # Static site: serve the file, the directory's index.html, or 404.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
